<script>
layui.use(['form', 'layedit', 'laydate'], function(){
	var form = layui.form
	,layer = layui.layer
	,layedit = layui.layedit
	,$ = layui.jquery
	,laydate = layui.laydate;
	form.render();
	//init
	var json_data= {
			"configlist":{
				"sip.config":"sip.config",
				"action": 0
			},
			"return_value": 0
		}
	$.ajax({
			type:"POST",
			url:'../cgi-bin/webTransData.cgi',
			ContentType:"application/json;charset=utf-8",
			dataType:"json",
			data:JSON.stringify(json_data),
			success:function(data){
		//sip
			
	   		$("#authmode").val(Number(data['sip.config'].authmode));
	   		var sip_switch = data['sip.config'].transtype;
			if(sip_switch==1)
				$("input[name='sipswitch'][value='1']").attr("checked",true);
			else
				$("input[name='sipswitch'][value='0']").attr("checked",true);
			document.getElementById('serverid').value = data['sip.config'].serverid;	
			document.getElementById('serverip').value = data['sip.config'].serverip;
			document.getElementById('serverport').value = data['sip.config'].serverport;
			document.getElementById('logindomain').value = data['sip.config'].logindomain;
			document.getElementById('deviceid').value = data['sip.config'].deviceid;
			document.getElementById('localport').value = data['sip.config'].localport;
			document.getElementById('authpasswd').value = data['sip.config'].authpasswd;
			$("#authmode").val(Number(data['sip.config'].authmode));
			$("#transtype").val(Number(data['sip.config'].transtype));
			document.getElementById('expires').value = data['sip.config'].expires;
			document.getElementById('heartbeatinterval').value = data['sip.config'].heartbeatinterval;
			document.getElementById('heartbeatcount').value = data['sip.config'].heartbeatcount;
			document.getElementById('mediaport').value = data['sip.config'].mediaport;
		//base
		/*	document.getElementById('name').value = data['base.config'].name;
			document.getElementById('manufacturer').value = data['base.config'].manufacturer;
			document.getElementById('model').value = data['base.config'].model;
			document.getElementById('owner').value = data['base.config'].owner;
			document.getElementById('civilcode').value = data['base.config'].civilcode;
			document.getElementById('block').value = data['base.config'].block;
			document.getElementById('address').value = data['base.config'].address; */
			form.render();
			},error:function(data){
				alert("Data Error!");
			}
		});
	
	//  sip表单提交 
	form.on('submit(sip_sub)',function (){
		alert(Number($('input[name="sipswitch"]:checked ').val())+"--"+document.getElementById('serverid').value+"--"+Number($("#authmode").val())+"--"+Number($("#transtype").val()));
		var sipInfo= {
			"configlist":{
				"sip.config":"sip.config",
				"action": 1
			},
			"sip.config":{
				"sipswitch":Number($('input[name="sipswitch"]:checked ').val()),
				"serverid":document.getElementById('serverid').value,
				"serverip":document.getElementById('serverip').value,
				"serverport":Number(document.getElementById('serverport').value),
				"logindomain":document.getElementById('logindomain').value,
				"deviceid":document.getElementById('deviceid').value,
				"localport":Number(document.getElementById('localport').value),
				"authpasswd":document.getElementById('authpasswd').value,
				"authmode":Number($("#authmode").val()),
				"transtype":Number($("#transtype").val()),
				"expires":Number(document.getElementById('expires').value),
				"heartbeatinterval":Number(document.getElementById('heartbeatinterval').value),
				"heartbeatcount":Number(document.getElementById('heartbeatcount').value),
				"mediaport":Number(document.getElementById('mediaport').value),
			},
			"return_value": 0
		}
		$.ajax({
			type:"POST",
			url:'../cgi-bin/webTransData.cgi',
			ContentType:"application/json;charset=utf-8",
			dataType:"json",
			data:JSON.stringify(sipInfo),
			success:function(data){
				alert("Success");
			},error:function(data){
				alert("Error");
			}
		}); 
		return false;  	      
	});
});
