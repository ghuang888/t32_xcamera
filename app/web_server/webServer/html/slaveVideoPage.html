<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3c.org/TR/1999/REC-html401-19991224/loose.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title></title>
<script src="js/jquery.min.js"></script>
</head>
<body>
<div class="div">
    <object type='application/x-vlc-plugin' id='vlc' events='True' width="1200" height="700">
        <param name='mrl' value='' />
		<script type="text/javascript">
			function getCookie(name){
				var strcookie = document.cookie;
				var arrcookie = strcookie.split("; ");
				for ( var i = 0; i < arrcookie.length; i++) {
					var arr = arrcookie[i].split("=");
					if (arr[0] == name)
						return arr[1];
				}
				return "";
			}
			var slaveRtspaddr =  unescape(getCookie("slaveRtspaddr"));
			document.getElementById("vlc").getElementsByTagName("param")[0].value = slaveRtspaddr;
		</script>
        <param name='volume' value='50' />
        <param name='autoplay' value='true' />
        <param name='loop' value='false' />
        <param name='fullscreen' value='true' />
    </object>
</div>
</body>
</html>
