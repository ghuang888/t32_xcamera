<!--[if IE]>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN">
<![endif]-->
<html lang="en" class="no-js">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>基本信息</title>
		<link rel="stylesheet" href="layui/css/layui.css" media="all">
		<script src="js/html5.js"></script>
		<script src="js/jquery.min.js"></script>
		<script src="layui/layui.js"></script>
		<style>
			.layui-field-box{
				text-align: center;
			}
		</style>
	</head>
	<body>
		<form class="layui-form">
			<div class="main" style="width:500px;margin-left: 500px;">
				<div class="layui-inline">
					<label class="layui-form-label"  style="font-size: 16px;width: 200px;text-align: right;margin-left: -50px;">主码流：</label>
					<div class="layui-input-inline">
						<input type="radio" name="switch" id="master_switch" checked="checked" lay-filter="switch_filter" value="0">
					</div>
				</div>
				<div class="layui-inline" id="slave">
					<label class="layui-form-label"  style="font-size: 16px;width: 100px;text-align: right;margin-left: -10px;">从码流：</label>
					<div class="layui-input-inline">
						<input type="radio" name="switch" id="slave_switch" lay-filter="switch_filter" value="1">
					</div>
				</div>
			</div>
			<fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
				<legend></legend>
			</fieldset>
			<fieldset class="layui-elem-field" style="font-size: 16px;">
				<legend>Record Video</legend>
				<div class="layui-field-box">
						<div class="layui-inline">
							<div class="layui-form-item" style="width: 1500px;">
								<div class="layui-col-xs4">
									<label class="layui-form-label" style="font-size: 16px;width: 200px;text-align: right;margin-left: 180px;">Path：</label>
								</div>
								<div class="layui-col-xs4" style="width: 400px;margin-left: -50px;">
									<input type="file" style="margin-left: 30px;" name="record_path" id="record_path" autocomplete="off" class="layui-input">
								</div>
								<div class="layui-col-xs4">
									<button type="submit" class="layui-btn" id="record_path_select_btn" lay-submit="record_path_select_btn" lay-filter="record_path_select_btn" style="display:block;margin:0 auto;width: 200px;">选择</button>
								</div>
							</div>
						</div>
						<div class="layui-inline">
							<div class="layui-form-item" style="width: 1500px;">
								<div class="layui-col-xs6">
									<button type="button" class="layui-btn" id="record_start_btn" lay-submit="record_start_btn" lay-filter="record_start_btn" style="display:block;margin-left: 450px;width: 150px;">START</button>
								</div>
								<div class="layui-col-xs6">
									<button type="button" class="layui-btn" id="record_stop_btn" lay-submit="record_stop_btn" lay-filter="record_stop_btn" style="display:block;margin-left: 100px;width: 150px;">STOP</button>
								</div>
							</div>
						</div>
				</div>
			</fieldset>
			<fieldset class="layui-elem-field" style="font-size: 16px;">
				<legend>Video Summary</legend>
				<div class="layui-field-box">
						<div class="layui-inline">
							<div class="layui-form-item" style="width: 1500px;">
								<div class="layui-col-xs4">
									<label class="layui-form-label" style="font-size: 16px;width: 200px;text-align: right;margin-left: 180px;">Path：</label>
								</div>
								<div class="layui-col-xs4" style="width: 400px;margin-left: -50px;">
									<input type="text" style="margin-left: 30px;" name="videosummary_path" id="videosummary_path" autocomplete="off" class="layui-input">
								</div>
								<div class="layui-col-xs4">
									<button type="submit" class="layui-btn" id="videosummary_path_select_btn" lay-submit="videosummary_path_select_btn" lay-filter="videosummary_path_select_btn" style="display:block;margin:0 auto;width: 200px;">选择</button>
								</div>
							</div>
						</div>
						<div class="layui-inline">
							<div class="layui-form-item" style="width: 1500px;">
								<div class="layui-col-xs6">
									<button type="button" class="layui-btn" id="videosummary_start_btn" lay-submit="videosummary_start_btn" lay-filter="videosummary_start_btn" style="display:block;margin-left: 450px;width: 150px;">START</button>
								</div>
								<div class="layui-col-xs6">
									<button type="button" class="layui-btn" id="videosummary_stop_btn" lay-submit="videosummary_stop_btn" lay-filter="videosummary_stop_btn" style="display:block;margin-left: 100px;width: 150px;">STOP</button>
								</div>
							</div>
						</div>
				</div>
			</fieldset>
			<fieldset class="layui-elem-field" style="font-size: 16px;">
				<legend>抓图设置</legend>
				<div class="layui-field-box">
						<div class="layui-inline">
							<div class="layui-form-item" style="width: 1500px;">
								<div style="margin-top: 20px;height: 38px;">
									<div style="float: left;margin-left: 430px;margin-top: 5px;">
										<label style="font-size: 16px;">通道</label>
									</div>
									<div >
										<div style="display: flex;float: left;margin-left: 140px;" >
											<select  name="snapChnSel" id="snapChnSel" lay-filter="snapChnSel" lay-verify="snapChnSel">
												<option value="0">通道0</option>
												<option value="1">通道1</option>
											</select> 
										</div>
										<div style="display: flex; margin-left: 900px;height: 40px;">
											<text id="snapNotif" style="font-size: 16px;height: 30px;margin-top: 5px;color: red;">未开启</text>
										</div>
									</div>
								</div>
								<div style="margin-top: 20px;height: 38px;">
									<div style="float: left;margin-left: 430px;margin-top: 5px;">
										<label style="font-size: 16px;">间隔(秒/张)</label>
									</div>
									<div style="float:right;margin-right: 650px;width: 249px;">
										<input type="text"  name="snapTimSel" id="snapTimSel" autocomplete="off" class="layui-input">
									</div>
								</div>
							</div>
						</div>
						<div class="layui-inline" style="margin-top: 20px;">
							<div class="layui-form-item" style="width: 1500px;">
								<div class="layui-col-xs6">
									<button type="submit" class="layui-btn" id="snap_start_btn" lay-submit="snap_start_btn" lay-filter="snap_start_btn" style="display:block;margin-left: 450px;width: 150px;">START</button>
								</div>
								<div class="layui-col-xs6">
									<button type="submit" class="layui-btn" id="snap_stop_btn" lay-submit="snap_stop_btn" lay-filter="snap_stop_btn" style="display:block;margin-left: 100px;width: 150px;">STOP</button>
								</div>
							</div>
						</div>
				</div>
				<div style="margin-left: 500px;">
					<button id="play" style="float: left; width: 100px; height: 100px;border-radius: 50%;border-color: white; margin-top: 120px;background-color: #009688;color: white;border-style: solid;">Snap</button>
					<div>
						<canvas id="video" width="480" height="320" style=" margin-left: 100px;"></canvas>
					</div>
				</div>
			</fieldset>
		</form>
		<br><br><br>
		<div class="layui-form-item">
				<button type="button" class="layui-btn" id="more_control_btn" onclick="more_control_btn_click()" lay-submit="more_control_btn" lay-filter="more_control_btn" style="display:block;margin-left: 450px;width:700px">更多设置</button>
		</div>
		<script type="text/javascript" src="js/libde265.js"></script>
		<script>
			var VIDEO_URL = "img/snap-1.hevc";

			var player = null;

			window.onload = function() {
				var video = document.getElementById("video");
				var status = document.getElementById("status");

				var playback = function(event) {
					event.preventDefault();
					if (player) {
						player.stop();
					}
					var image_control= {
						"configlist":{
							"encoder.snap":"encoder.snap",
							"action": 1,
						},
						"encoder.snap":{
							"snapManual": 1,
						},
						"return_value": 0
					};
					$.ajax({
						type:"POST",
						url:'../cgi-bin/webTransData.cgi',
						ContentType:"application/json;charset=utf-8",
						dataType:"json",
						data:JSON.stringify(image_control),
						success:function(data){
							player = new libde265.RawPlayer(video);
							player.set_status_callback(function(msg, fps) {
							player.disable_filters(true);

							});
					player.playback(VIDEO_URL);
						},error:function(data){
							alert("Error");
						}
					});

				};

				var button = document.getElementById("play");
				if (button.addEventListener) {
					button.addEventListener("click", playback, false);
				} else if (button.attachEvent){
					button.attachEvent('onclick', playback);
				}
			};
			layui.use(['form', 'layer'], function() {
				var form = layui.form,
					$ = layui.jquery;
				form.render();
				var ispcontrolInfo= {
					"configlist":{
						"encoder.snap":"encoder.snap",
						"action": 0,
					},
					"return_value": 0,
				};
				$.ajax({
					type:"POST",
					url:'../cgi-bin/webTransData.cgi',
					ContentType:"application/json;charset=utf-8",
					dataType:"json",
					data:JSON.stringify(ispcontrolInfo),
					success:function(data){
						document.getElementById("snapTimSel").value = data['encoder.snap'].snapTimSel;
						if(Number(data['encoder.snap'].snapTimSel) > 0)
							document.getElementById("snapNotif").innerHTML = "运行中";
						else
							document.getElementById("snapNotif").innerHTML = "未开启";
						form.render();
					},error:function(data){
						//alert("Error");
					}
				});
				form.on('submit(snap_start_btn)',function (){
					var snapTimSel = document.getElementById("snapTimSel").value;
					var snapChnSel        = $("#snapChnSel").val();
					var image_control= {
						"configlist":{
							"encoder.snap":"encoder.snap",
							"action": 1,
						},
						"encoder.snap":{
							"snapChnSel":Number(snapChnSel),
							"snapTimSel":Number(snapTimSel),
						},
						"return_value": 0
					};
					$.ajax({
						type:"POST",
						url:'../cgi-bin/webTransData.cgi',
						ContentType:"application/json;charset=utf-8",
						dataType:"json",
						data:JSON.stringify(image_control),
						success:function(data){
							//alert("Success");
						},error:function(data){
							alert("Error");
						}
					});
				});

				form.on('submit(snap_stop_btn)',function (){
					var snapChnSel        = $("#snapChnSel").val();
					var image_control= {
						"configlist":{
							"encoder.snap":"encoder.snap",
							"action": 1,
						},
						"encoder.snap":{
							"snapChnSel":Number(snapChnSel),
							"snapTimSel":Number(0),
						},
						"return_value": 0
					};
					$.ajax({
						type:"POST",
						url:'../cgi-bin/webTransData.cgi',
						ContentType:"application/json;charset=utf-8",
						dataType:"json",
						data:JSON.stringify(image_control),
						success:function(data){
							//alert("Success");
						},error:function(data){
							alert("Error");
						}
					});
				});
			});
			function more_control_btn_click(){
				layer.open({
				type: 2,
				title: '更多设置',
				area: ['1000px', '700px'],
				moveType: 1,
				scrollbar: false,
				moveOut: false,
				content: 'encoderdetailSet.html'
				});
			}
		</script>
	</body>
</html>
