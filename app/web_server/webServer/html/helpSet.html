<!--[if IE]>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN">
<![endif]-->
<html lang="en" class="no-js">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>基本信息</title>
		<link rel="stylesheet" href="layui/css/layui.css" media="all">
		<script src="js/html5.js"></script>
		<script src="js/jquery.min.js"></script>
		<script src="layui/layui.js"></script>
		<style>
			.layui-field-box{
				text-align: center;
			}
		</style>
	</head>
	<body>
		<form class="layui-form">
			<div class="main" style="width:1500px;margin-left: 500px;">
				<div class="layui-inline">
					<label class="layui-form-label" style="font-size: 16px;width: 200px;text-align: right;margin-left: -50px;">主码流：</label>
					<div class="layui-input-inline">
						<input type="radio" name="switch" id="master_switch" checked="checked" lay-filter="switch_filter" value="0">
					</div>
				</div>
				<div class="layui-inline" id="slave">
					<label class="layui-form-label" style="font-size: 16px;width: 100px;text-align: right;margin-left: -10px;">从码流：</label>
					<div class="layui-input-inline">
						<input type="radio" name="switch" id="slave_switch" lay-filter="switch_filter" value="1">
					</div>
				</div>
			</div>
			<fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
			</fieldset>
			<br>
			<div class="layui-field-box">
				<div class="layui-form-item" style="width: 1000px;">
					<div class="layui-col-xs6">
						<label class="layui-form-label" style="font-size: 16px;text-align: right; margin-left: 300px;">Language：</label>
					</div>
					<div class="layui-col-xs6">
						<select name="language" id="language">
							<option value="0">Chinese</option>
							<option value="1">English</option>
						</select>
					</div>
				</div>
			</div>
			<fieldset class="layui-elem-field" style="font-size: 16px;">

				
			</fieldset>
		</form>
		<div style=" border: 3px solid #e6e6e6;margin: 5px;">
			<legend style="font-size: 20px;">OSDShow</legend>
			<div class="layui-field-box">
				<div class="layui-inline">
					<div class="layui-form-item" style="width: 1000px;font-size: 16px;">
						<div class="layui-col-xs4">
							<label class="layui-form-label" style="text-align: right;font-size: 16px;">通道标题</label>
						</div>
						<div class="layui-col-xs4">
							<input type="text" id="strin" name="strin" style="font-size: 14px;margin-left: -50px;" lay-verify="title"
							 class="layui-input">
						</div>
						<div class="layui-col-xs4">
							<button type="submit" class="layui-btn" id="master_sub" lay-submit="master_sub" lay-filter="master_sub" style="display:block;margin-left: 100px;width: 150px;">Write</button>
						</div>
					</div>
				</div>
			</div>
			<div class="layui-field-box">
				<div class="layui-inline">
					<div class="layui-form-item" style="width: 1000px;font-size: 16px;">
						<div class="layui-col-xs4" style="width: 100px;">
							<label class="layui-form-label" style="text-align: right;font-size: 16px;margin-left: 100px;">TimeStampShow：</label>
						</div>
						<div class="layui-col-xs4" style="margin-left: 230px; width: 40px;">
							<input type="checkbox" id="timestampshow" name="timestampshow" lay-skin="primary" style="width: 15px;height: 15px;margin-top: 10px;">
						</div>
						<div class="layui-col-xs4" >
							<label class="layui-form-label" style="text-align: left;font-size: 16px; margin-left: 30px;"">Enable</label>
						</div>
					</div>
				</div>
				<div class="layui-inline">
					<div class="layui-form-item" style="width: 1000px;font-size: 16px;">
						<div class="layui-col-xs4" style="width: 100px;">
							<label class="layui-form-label" style="text-align: right;font-size: 16px;margin-left: 100px;">FPSShow：</label>
						</div>
						<div class="layui-col-xs4" style="margin-left: 230px; width: 40px;">
							<input type="checkbox" id="fpsshow" name="fpsshow" lay-skin="primary" style="width: 15px;height: 15px;margin-top: 10px;">
						</div>
						<div class="layui-col-xs4" >
							<label class="layui-form-label" style="text-align: left;font-size: 16px; margin-left: 30px;"">Enable</label>
						</div>
					</div>
				</div>
				<div class="layui-inline">
					<div class="layui-form-item" style="width: 1000px;font-size: 16px;">
						<div class="layui-col-xs4" style="width: 100px;">
							<label class="layui-form-label" style="text-align: right;font-size: 16px;margin-left: 100px;" >TitleShow：</label>
						</div>
						<div class="layui-col-xs4" style="margin-left: 230px; width: 40px;">
							<input type="checkbox" id="logoshow" name="logoshow" lay-skin="primary" style="width: 15px;height: 15px;margin-top: 10px;">
						</div>
						<div class="layui-col-xs4" >
							<label class="layui-form-label" style="text-align: left;font-size: 16px;margin-left: 30px;">Enable</label>
						</div>
					</div>
					<div class="layui-inline">
						<div class="layui-form-item" style="margin-left: -430px;">
							<label class="layui-form-label">TitlePos</label>
							<div class="layui-input-inline" >
								<select name="titlepos" id="titlepos" lay-filter="titlepos" lay-verify="titlepos" style="width: 100px; height:38px;font-size: 15px;background-color: white;border-color: #e6e6e6;margin-left: 155px;">
									<option value="0">左下</option>
									<option value="1">右上</option>
									<option value="2">右下</option>
								</select> 
							</div>
						</div>
					</div>
				</div>
				
			</div>
		</div>
		<div style=" border: 3px solid #e6e6e6;margin: 5px; margin-top: 20px;">
			<legend style="font-size: 20px;">算法开关</legend>
			<div class="layui-field-box">
				<div class="layui-inline">
					<div class="layui-form-item" style="width: 1000px;font-size: 16px;">
						<div class="layui-col-xs4" style="width: 100px;">
							<label class="layui-form-label" style="text-align: right;font-size: 16px;margin-left: 100px;">movedetEnable:</label>
						</div>
						<div class="layui-col-xs4" style="margin-left: 230px; width: 40px;">
							<input type="checkbox" id="ivsmove" name="ivsmove" lay-skin="primary" style="width: 15px;height: 15px;margin-top: 10px;">
						</div>
					</div>
				</div>
				<div class="layui-inline">
					<div class="layui-form-item" style="width: 1000px;font-size: 16px;">
						<div class="layui-col-xs4" style="width: 100px;">
							<label class="layui-form-label" style="text-align: right;font-size: 16px;margin-left: 100px;">pervehpetEnable:</label>
						</div>
						<div class="layui-col-xs4" style="margin-left: 230px; width: 40px;">
							<input type="checkbox" id="ivspervehpet" name="ivspervehpet" lay-skin="primary" style="width: 15px;height: 15px;margin-top: 10px;">
						</div>
					</div>
				</div>
				<div class="layui-inline">
					<div class="layui-form-item" style="width: 1000px;font-size: 16px;">
						<div class="layui-col-xs4" style="width: 100px;">
							<label class="layui-form-label" style="text-align: right;font-size: 16px;margin-left: 100px;" >facedetEnable</label>
						</div>
						<div class="layui-col-xs4" style="margin-left: 230px; width: 40px;">
							<input type="checkbox" id="ivsface" name="ivsface" lay-skin="primary" style="width: 15px;height: 15px;margin-top: 10px;">
						</div>
					</div>
				</div>
				<div style="display: block;margin-left: 25%;">
					<button type="submit" class="layui-btn" id="ivssub" lay-submit="ivssub" lay-filter="ivssub" style="display:block;margin-left: 100px;width: 150px;">Write</button>
				</div>
			</div>
		<script>
			var logoshow = document.getElementById("logoshow");
					
			layui.use(['form', 'layer'], function() {
				var form = layui.form,
					$ = layui.jquery;
				form.render();
				var ispcontrolInfo= {
					"configlist":{
						"encoder.osd":"encoder.osd",
						"action": 0,
					},
					"return_value": 0,
				};
				$.ajax({
					type:"POST",
					url:'../cgi-bin/webTransData.cgi',
					ContentType:"application/json;charset=utf-8",
					dataType:"json",
					data:JSON.stringify(ispcontrolInfo),
					success:function(data){
						var strin = document.getElementById("strin");
						var timestampshow = document.getElementById("timestampshow");
						var fpsshow = document.getElementById("fpsshow");
						var logoshow = document.getElementById("logoshow");
						var ivsmove = document.getElementById("ivsmove");
						var ivspervehpet = document.getElementById("ivspervehpet");
						var ivsface = document.getElementById("ivsface");
						document.getElementById("titlepos").selectedIndex = data['encoder.osd'].titlepos;
						if (data['encoder.osd'].timestampshow == 1) {
							timestampshow.checked = true;
						} else {
							timestampshow.checked = false;
						}
						if (data['encoder.osd'].fpsshow == 1) {
							fpsshow.checked = true;
						} else {
							fpsshow.checked = false;
						}
						if (data['encoder.osd'].logoshow == 1) {
							logoshow.checked = true;
						} else {
							logoshow.checked = false;
						}
						if (data['encoder.osd'].ivsmove == 1) {
							ivsmove.checked = true;
						} else {
							ivsmove.checked = false;
						}
						if (data['encoder.osd'].ivspervehpet == 1) {
							ivspervehpet.checked = true;
						} else {
							ivspervehpet.checked = false;
						}
						if (data['encoder.osd'].ivsface == 1) {
							ivsface.checked = true;
						} else {
							ivsface.checked = false;
						}
						if(data['encoder.osd'].strin)
							strin.value = data['encoder.osd'].strin;
						else{
							strin.value = "";
						}
						form.render();
					},error:function(data){
						//alert("Error");
					}
				});
				form.on('submit(master_sub)',function (){
					var strin = document.getElementById("strin").value;
					var timestampshow = document.getElementById("timestampshow").checked;
					var fpsshow = document.getElementById("fpsshow").checked;
					var logoshow = document.getElementById("logoshow").checked;
					var titlepos        = $("#titlepos").val();
					var image_control= {
						"configlist":{
							"encoder.osd":"encoder.osd",
							"action": 1,
						},
						"encoder.osd":{
							"strin":strin,
							"timestampshow":Number(timestampshow),
							"fpsshow":Number(fpsshow),
							"logoshow":Number(logoshow),
							"titlepos":Number(titlepos),
						},
						"return_value": 0
					};
					$.ajax({
						type:"POST",
						url:'../cgi-bin/webTransData.cgi',
						ContentType:"application/json;charset=utf-8",
						dataType:"json",
						data:JSON.stringify(image_control),
						success:function(data){
							//alert("Success");
						},error:function(data){
							alert("Error");
						}
					});
					location.reload();
				});
				form.on('submit(ivssub)',function (){
					var ivsmove = document.getElementById("ivsmove").checked;
					var ivspervehpet = document.getElementById("ivspervehpet").checked;
					var ivsface = document.getElementById("ivsface").checked;
					var image_control= {
						"configlist":{
							"encoder.osd":"encoder.osd",
							"action": 1,
						},
						"encoder.osd":{
							"ivsmove":Number(ivsmove),
							"ivspervehpet":Number(ivspervehpet),
							"ivsface":Number(ivsface),
						},
						"return_value": 0
					};
					$.ajax({
						type:"POST",
						url:'../cgi-bin/webTransData.cgi',
						ContentType:"application/json;charset=utf-8",
						dataType:"json",
						data:JSON.stringify(image_control),
						success:function(data){
							//alert("Success");
						},error:function(data){
							alert("Error");
						}
					});
					location.reload();
				});
			});

			function more_control_btn_click() {
				layer.open({
					type: 2,
					title: '更多设置',
					area: ['1000px', '700px'],
					moveType: 1,
					scrollbar: false,
					moveOut: false,
					content: 'encoderdetailSet.html'
				});
			}	
		</script>
	</body>
</html>
