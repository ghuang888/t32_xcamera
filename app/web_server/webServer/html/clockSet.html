<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
<meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge"> 
<meta name="viewport" content="width=device-width, initial-scale=1"> 
<title>基本信息</title>
<link rel="stylesheet" href="layui/css/layui.css"  media="all">
<script src="js/html5.js"></script>
<script src="js/jquery.min.js"></script>
</head>
<body>
<form class="layui-form">
	<fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
	  <legend>时钟设置</legend>
	</fieldset>
		<div class="layui-inline">
			<div class="layui-form-item" style="width: 1000px;">
				<div class="layui-col-xs4">
					<label class="layui-form-label" style="font-size: 16px;width: 150px;text-align: right;">时区：</label>
				</div>	
				<div class="layui-col-xs4" style="width: 400px;margin-left: -100px;">
					<select name="quiz">
						<option value="北京">（GMT+08:00）北京,香港,新加坡,台北</option>
					</select>
				</div>
			</div>
		</div>	
			<div class="layui-form-item" style="width: 1000px;">
				<div class="layui-col-xs6">
					<label class="layui-form-label" style="font-size: 16px;width: 150px;text-align: right;">日期：</label>
				</div>
				<div class="layui-col-xs6" style="width: 400px;margin-left: -267px;">
					<input type="text" class="layui-input" id="day"  />
				</div>
			</div>
			<div class="layui-form-item" style="width: 1000px;">
				<div class="layui-col-xs6">
					<label class="layui-form-label" style="font-size: 16px;width: 150px;text-align: right;">时间：</label>
				</div>
				<div class="layui-col-xs6" style="width: 400px;margin-left: -267px;">
					<input type="text" class="layui-input" id="time" >
				</div>
			</div>
			<div class="layui-form-item" style="width: 1000px;">
				<div class="layui-col-xs6" >
					<label class="layui-form-label" style="font-size: 16px;width: 150px;text-align: right;">时间与PC同步：</label>
				</div>
				<div class="layui-col-xs6" style="width: 400px;margin-left: -267px;">
					<input type="checkbox" name="close" lay-skin="switch" lay-text="ON|OFF" lay-filter="switchBtn">
				</div>
			</div>
	<fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
	</fieldset>
		<button type="submit" class="layui-btn" lay-submit="" lay-filter="sub"  style="display:block;margin:0 auto;">保存</button>
</form>
<script src="layui/layui.js"></script>
<script>
var myVar="";
function setTime(){
	layui.use(['form','laydate'], function() {
		var form = layui.form //部分表单元素才会自动修饰成功 
		,$ = layui.jquery
		,laydate = layui.laydate;
		form.render(); 
		thisTime = new Date();
		year = thisTime.getFullYear();
		month = thisTime.getMonth();
		date = thisTime.getDate();
		sec = thisTime.getSeconds();
		min = thisTime.getMinutes();
		hr  =  thisTime.getHours();
		if(month<10){
			month = "0" +month;
		}
		laydate.render({
			elem: '#time'
			,value: hr+'点'+min+'分'+sec+'秒'
			});
		laydate.render({
			elem: '#day'
			,format: 'yyyy-MM-dd'
			,value:year+'-'+month+'-'+date
			});
	}); 
}
layui.use(['form','laydate'], function() {
	var form = layui.form //部分表单元素才会自动修饰成功
	,$ = layui.jquery
	,laydate = layui.laydate;
	form.render(); 
	initTime = new Date();
	year = initTime.getFullYear();
	month = initTime.getMonth();
	date = initTime.getDate();
	sec = initTime.getSeconds();
	hr =  initTime.getHours();
	min = initTime.getMinutes();
	if(month<10){
		month = "0" +month;
	}
	laydate.render({
		elem: '#day'
		,format: 'yyyy-MM-dd'
		,value: year+'-'+month+'-'+date
		,isInitValue: true
	});
	laydate.render({
		elem: '#time'
		,type: 'time'
		,format: 'H点m分s秒'
		,value: hr+'点'+min+'分'+sec+'秒'
		,isInitValue: true
	});
	form.on('switch(switchBtn)', function(data){
		var status = data.elem.checked;
		if(status==true){
			myVar = setInterval("setTime()",1000);
		}else{
			clearInterval(myVar);
		}
	});  
});
</script>
</body>
</html>
