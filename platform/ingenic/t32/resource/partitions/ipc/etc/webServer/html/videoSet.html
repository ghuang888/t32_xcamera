<script>
function doProcessResolution(width,height){
	if (width==320 && height==240)
		return 0;
	if (width==352 && height==288)
		return 1;
	if (width==640 && height==360)
		return 2;
	if (width==640 && height==540)
		return 3;
	if (width==704 && height==576)
		return 4;
	if (width==1280 && height==720)
		return 5;
	if (width==1280 && height==960)
		return 6;
	if (width==1920 && height==1080)
		return 7;
	if (width==2304 && height==1296)
		return 8;
	if (width==2560 && height==1440)
		return 9;
	if (width==2560 && height==1920)
		return 10;
};
function doProcessEnctype(type) {
	if (type == "h264")
		return "0";
	if (type == "h265")
		return "1";
}
layui.use(['form','layer','layedit', 'laydate'], function(){
	var form = layui.form
	,layer = layui.layer
	,layedit = layui.layedit
	,$ = layui.jquery
	,laydate = layui.laydate;
	form.render();
	form.verify({
			slave_codeRate: function (value) {
				if (Number(value)<32 || Number(value)>1024) {
				return '主码流码率范围必须在32~1024之间';
				}
			}
	});
	form.verify({
			master_frameInterval: function (value) {
				if (Number(value)<0 || Number(value)>360) {
				return '主码流I帧间隔范围必须在0~360之间';
				}
			}
	});
	form.verify({
			slave_frameInterval: function (value) {
				if (Number(value)<0 || Number(value)>360) {
				return '从码流I帧间隔范围必须在0~360之间';
				}
			}
	});
	// init data
	var json_data= {
			"configlist":{
				"video.isp.fps":"video.isp.fps",
				"video.resolution":"video.resolution",
				"video.enctype":"video.enctype",
				"video.rcmode":"video.rcmode",
				"video.qp":"video.qp",
				"video.goplength":"video.goplength",
				"video.switch":"video.switch",
				"video.bitrate":"video.bitrate",
				"action": 0,
			},
			"return_value": 0
		}
		$.ajax({
			type:"POST",
			url:'../cgi-bin/webTransData.cgi',
			ContentType:"application/json;charset=utf-8",
			dataType:"json",
			data:JSON.stringify(json_data),
			success:function(data){
		//slave 
			var slave_rcmode_flag;
			var slave_rcmode = data['video.rcmode'].ch1.rcmode;
			if(slave_rcmode=="cbr")
				slave_rcmode_flag=0;
			if(slave_rcmode=="vbr")
				slave_rcmode_flag=1;
			if(slave_rcmode=="smart")
				slave_rcmode_flag=2;
			if(slave_rcmode=="cvbr")
				slave_rcmode_flag=3;
			if(slave_rcmode=="avbr")
				slave_rcmode_flag=4;

			var slave_switch_status = data['video.switch'].ch1.status;
			if(slave_switch_status==1)
				$("input[name='slave_switch'][value='1']").attr("checked",true);
			else
				$("input[name='slave_switch'][value='0']").attr("checked",true);
	   		$("#slave_resolution").val(doProcessResolution(data['video.resolution'].ch1.picwidth,data['video.resolution'].ch1.picheight));
			document.getElementById('slave_frameRate').value = data['video.isp.fps'].fpsnum;
			document.getElementById('slave_codeRate').value = data['video.bitrate'].ch1.bitrate;
			document.getElementById('slave_frameInterval').value = data['video.goplength'].ch1.goplength;
			document.getElementById('slave_rateController').options[Number(slave_rcmode_flag)].selected = true;
			document.getElementById('slave_compressionFormat').options[0].selected = true;
			document.getElementById("ch_qp1").selectedIndex = data['video.qp'].ch1.qp;
			var slave_resolution_value  = Number(doProcessResolution(data['video.resolution'].ch1.picwidth,data['video.resolution'].ch1.picheight));
			switch(slave_resolution_value){
				case 4:
					$("#slave_frameRate_limit").html("(1-25)");
					break;	
				case 3:
					$("#slave_frameRate_limit").html("(1-25)");
					break;
				case 2:
					$("#slave_frameRate_limit").html("(1-25)");
					break;	
				case 1:
					$("#slave_frameRate_limit").html("(1-25)");
					break;
				case 0:
					$("#slave_frameRate_limit").html("(1-15)");
					break;	
				}
		//master
			var master_rcmode_flag;
			var master_rcmode = data['video.rcmode'].ch0.rcmode;
		var slave_rcmode_flag;
		if(Number(master_rateController)==0)
			master_rcmode_flag="cbr";
		if(Number(master_rateController)==1)
			master_rcmode_flag="cbr";
		if(Number(master_rateController)==2)
			master_rcmode_flag="smart";
		if(Number(master_rateController)==3)
			master_rcmode_flag="cvbr";
		if(Number(master_rateController)==4)
			master_rcmode_flag="avbr";
			$("#master_resolution").val(doProcessResolution(data['video.resolution'].ch0.picwidth,data['video.resolution'].ch0.picheight));
			document.getElementById('master_frameRate').value = data['video.isp.fps'].fpsnum;			
			document.getElementById('master_codeRate').value = data['video.bitrate'].ch0.bitrate;
			document.getElementById('master_frameInterval').value = data['video.goplength'].ch0.goplength;
			document.getElementById('master_rateController').options[Number(master_rcmode_flag)].selected = true;
			document.getElementById('master_compressionFormat').options[0].selected = true;
			var master_resolution_value = Number(doProcessResolution(data['video.resolution'].ch0.picwidth,data['video.resolution'].ch0.picheight));
			document.getElementById("ch_qp0").selectedIndex = data['video.qp'].ch0.qp;
			switch(master_resolution_value){
				case 9:
					$("#master_frameRate_limit").html("(1-25)");
					$("#master_codeRate_limit").html("(32-8192)");
					break;			
				case 8:
					$("#master_frameRate_limit").html("(1-25)");
					$("#master_codeRate_limit").html("(32-8192)");
					break;
				case 7:
					$("#master_frameRate_limit").html("(1-25)");
					$("#master_codeRate_limit").html("(32-8192)");
					break;	
				case 6:
					$("#master_frameRate_limit").html("(1-25)");
					$("#master_codeRate_limit").html("(32-6144)");
					break;
				case 5:
					$("#master_frameRate_limit").html("(1-25)");
					$("#master_codeRate_limit").html("(32-4096)");
					break;	
				case 4:
					$("#master_frameRate_limit").html("(1-20)");
					$("#master_codeRate_limit").html("(32-2048)");
					break;
				case 3:
					$("#master_frameRate_limit").html("(1-15)");
					$("#master_codeRate_limit").html("(32-2048)");
					break;	
			}
			form.render();
			changeLimit();

			},error:function(data){
				// $("#master_sub").hide();
				// $("#slave_sub").hide();
			}
		});
	// 主码流分辨率下拉框改变事件
	form.on('select(master_resolution)',function(data){
		// data.value为当前选中下拉框value值
		var value = Number(data.value);
		switch(value){
			case 9:
				$("#master_frameRate_limit").empty();
				$("#master_frameRate_limit").html("(1-25)");
				$("#master_codeRate_limit").empty();
				$("#master_codeRate_limit").html("(32-8192)");
				break;	
			case 8:
				$("#master_frameRate_limit").empty();
				$("#master_frameRate_limit").html("(1-25)");
				$("#master_codeRate_limit").empty();
				$("#master_codeRate_limit").html("(32-8192)");
				break;
			case 7:
				$("#master_frameRate_limit").empty();
				$("#master_frameRate_limit").html("(1-25)");
				$("#master_codeRate_limit").empty();
				$("#master_codeRate_limit").html("(32-8192)");
				break;	
			case 6:
				$("#master_frameRate_limit").empty();
				$("#master_frameRate_limit").html("(1-25)");
				$("#master_codeRate_limit").empty();
				$("#master_codeRate_limit").html("(32-6144)");
				break;
			case 5:
				$("#master_frameRate_limit").empty();
				$("#master_frameRate_limit").html("(1-25)");
				$("#master_codeRate_limit").empty();
				$("#master_codeRate_limit").html("(32-4096)");
				break;	
			case 4:
				$("#master_frameRate_limit").empty();
				$("#master_frameRate_limit").html("(1-20)");
				$("#master_codeRate_limit").empty();
				$("#master_codeRate_limit").html("(32-2048)");
				break;
			case 3:
				$("#master_frameRate_limit").empty();
				$("#master_frameRate_limit").html("(1-15)");
				$("#master_codeRate_limit").empty();
				$("#master_codeRate_limit").html("(32-2048)");
				break;	
			}
		changeLimit();
	});
	// 从码流分辨率下拉框改变事件 //
	form.on('select(slave_resolution)',function(data){
		// data.value为当前选中下拉框value值
		var value = Number(data.value);
		if(value == 0)
		{
			$("#slave_frameRate_limit").empty();
			$("#slave_frameRate_limit").html("(1-15)");

			$("#slave_frameRate_limit").empty();
			$("#slave_frameRate_limit").html("(1-25)");
		}
		changeLimit();
	});
//  主码流表单提交验证 //
	form.on('submit(master_sub)',function (){
		var master_resolution        = $("#master_resolution").val();
		var master_frameRate         = document.getElementById('master_frameRate').value;
		var master_codeRate          = document.getElementById('master_codeRate').value;
		var master_frameInterval     = document.getElementById('master_frameInterval').value;

		var master_compressionFormat = $("#master_compressionFormat").val();

		var height=0;	
		var enctype;
