<!--[if IE]>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN">
<![endif]-->
<html lang="en" class="no-js">
<head>
<meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge"> 
<meta name="viewport" content="width=device-width, initial-scale=1"> 
<title>基本信息</title>
<link rel="stylesheet" href="layui/css/layui.css"  media="all">
<script src="js/html5.js"></script>
<script src="js/jquery.min.js"></script>
<script src="layui/layui.js"></script>
</style>
</head>
<body>
<form class="layui-form">
	<fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;text-align: center;">
		<legend>音频参数设置</legend>
	</fieldset>
	<div class="layui-inline">
		<div class="layui-form-item" style="width: 1000px;">
			<div class="layui-col-xs6">
				<label class="layui-form-label" style="font-size: 16px;width:200px;text-align: right;margin-left: 500px;">音频输入开关：</label>
			</div>
			<div class="layui-input-inline">
				<div class="layui-col-xs6" style="margin-left: 250px;">
					<input type="radio" name="videoRadio" value="关" title="关">
				</div>
			</div>
			<div class="layui-input-inline">
				<div class="layui-col-xs6" style="margin-left: 200px;">
					<input type="radio" name="viedoRadio" value="开" title="开" checked="">
				</div>
			</div>
		</div>	
	</div>
	<div class="layui-inline">
		<div class="layui-form-item" style="width: 1500px;">
			<div class="layui-col-xs6">
				<label class="layui-form-label"  style="font-size: 16px;width: 200px;text-align: right;margin-left: 500px;">音频输入方式：</label>
			</div>
			<div class="layui-col-xs6" style="width: 300px;">
				<select name="audioInputMethod" lay-verify="required" >
					<option value="1" style="font-size: 15px;">Mic</option>
					<option value="2" style="font-size: 15px;">Line-In</option>
				</select>
			</div>  
		</div>
	</div>
		<div class="layui-form-item" style="width: 1500px;">
			<div class="layui-col-xs6">
				<label class="layui-form-label"  style="font-size: 16px;width: 200px;text-align: right;margin-left: 500px;">音频输入编码方式：</label>
		 	</div>
			<div class="layui-col-xs6" style="width: 300px;">
		 		<select name="audioInputEncodeMethod" lay-verify="required" style="width: 200px;">
		 			<option value="1" style="font-size: 15px;">G711A</option>
		 			<option value="2" style="font-size: 15px;">G711U</option>
		 		</select>
		 	</div>  
		</div>
		<div class="layui-form-item" style="width: 1500px;">
			<div class="layui-col-xs6">
				<label class="layui-form-label"  style="font-size: 16px;width: 200px;text-align: right;margin-left: 500px;">音频输入音量：</label>
			</div>
			<div class="layui-col-xs6" style="width: 300px;">
					<div id="audioIntputVolume" class="demo-slider" style="margin-top: 18px;"></div>
			</div>
		</div>	
		<div class="layui-form-item" style="width: 1500px;">
			<div class="layui-col-xs6">
				<label class="layui-form-label"  style="font-size: 16px;width: 200px;text-align: right;margin-left: 500px;">音频输出音量：</label>
			</div>
			<div class="layui-col-xs6" style="width: 300px;">
				<div id="audioOutputVolume" class="demo-slider" style="margin-top: 18px;"></div>
			</div>
		</div>	
	<fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
	</fieldset>
		<div class="layui-form-item" style="width: 1500px;">
			<div class="btn" style="width:700px;margin: 0 auto;">
				<button type="submit" class="layui-btn" style="display: inline;margin-left: 130px;"  lay-submit="" lay-filter="sub" style="margin-left: 130px;">恢复默认</button>
				<button type="submit" class="layui-btn" style="display: inline;margin-left:300px;" lay-submit="" lay-filter="sub" style="margin-left: 110px;">保存</button>
			</div>
		</div> 
	</form>
<script>
layui.use(['form', 'slider', 'layer'], function() { 
	var form = layui.form
	,$ = layui.jquery
	,slider = layui.slider;
	form.render();
	slider.render({
		elem: '#audioIntputVolume'
		,value: 20
	});
	slider.render({
		elem: '#audioOutputVolume'
		,value: 30
	})
});	
</script>
</body>
</html>
